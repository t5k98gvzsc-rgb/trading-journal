<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendar</title>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/calendar.css">
  <link rel="manifest" href="../../manifest.json" />
  <meta name="theme-color" content="#0b1f3a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Trading Journal" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="../../src/icons/icon-192.png" />
</head>
<body>
  <div class="sidebar">
    <div class="top">
      <h2>Trading Journal</h2>
      <div class="nav-group">
        <a class="nav-item" href="../../index.html">Dashboard</a>
        <a class="nav-item" href="trades.html">Trades</a>
        <a class="nav-item active" href="calendar.html">Calendar</a>
      </div>
    </div>
    <div class="settings">
      <a class="nav-item" href="accounts.html">Accounts</a>
    </div>
  </div>

  <main class="main calendar-main">
    <header class="page-header">
      <h1>Calendar</h1>
      <div class="month-switcher" aria-label="Month selector">
        <button id="prevMonth" type="button" aria-label="Previous month">&lt;</button>
        <div id="monthLabel" class="month-label">Month</div>
        <button id="nextMonth" type="button" aria-label="Next month">&gt;</button>
      </div>
    </header>

    <section class="calendar-stats" aria-label="Monthly trading statistics">
      <article class="stat-box">
        <span class="stat-title">Monthly P&amp;L</span>
        <strong id="statMonthlyPnl">$0.00</strong>
      </article>
      <article class="stat-box">
        <span class="stat-title">Win Rate</span>
        <strong id="statWinRate">0%</strong>
      </article>
      <article class="stat-box">
        <span class="stat-title">W/L</span>
        <strong><span id="statWins">0</span><span class="slash">/</span><span id="statLosses">0</span></strong>
      </article>
      <article class="stat-box">
        <span class="stat-title">Trades</span>
        <strong id="statTrades">0</strong>
      </article>
      <article class="stat-box">
        <span class="stat-title">Trading Days</span>
        <strong id="statTradingDays">0</strong>
      </article>
      <article class="stat-box">
        <span class="stat-title">R:R</span>
        <strong id="statRR">0.00</strong>
      </article>
    </section>

    <section class="calendar-box">
    <section class="calendar-shell" aria-label="Trading calendar">
      <div class="calendar-area">
        <div class="calendar-weekdays" aria-hidden="true">
          <div>Mon</div>
          <div>Tue</div>
          <div>Wed</div>
          <div>Thu</div>
          <div>Fri</div>
          <div>Sat</div>
          <div>Sun</div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <aside class="weekly-area" aria-label="Weekly totals">
        <div class="weekly-heading">Weekly</div>
        <div id="weeklyGrid" class="weekly-grid"></div>
      </aside>
    </section>
    </section>
  </main>

  <script src="../js/calendar.js"></script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('../../service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
